workflows:
  ios-xper-release:
    name: Build iOS Automatique - Xper
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Génération du projet iOS avec le bon Bundle ID
        script: |
          # On force la création du projet avec com.bx.xper directement
          flutter create --org com.bx --project-name xper --platforms=ios .
          
          # Ajout des permissions GPS obligatoires
          plutil -insert NSLocationWhenInUseUsageDescription -string "GPS nécessaire pour la vitesse." ios/Runner/Info.plist
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "GPS nécessaire en arrière-plan." ios/Runner/Info.plist
      - name: Récupération des dépendances Flutter
        script: |
          flutter packages pub get
      - name: Configuration de CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Compilation brute de l'application (Sans Signature)
        script: |
          # On génère le fichier Runner.app sans demander de compte Apple
          flutter build ios --release --no-codesign
      - name: 🗜️ Création du fichier .ipa pour Sideloadly
        script: |
          # Sideloadly requiert une structure spécifique : un zip Payload/ contenant l'application
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Xper.ipa Payload
    artifacts:
      - build/ios/iphoneos/Xper.ipa
