workflows:
  ios-xper-release:
    name: Build iOS Automatique - Xper
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Generation du projet iOS et configuration GPS
        script: |
          flutter create --org com.bx --project-name xper --platforms=ios .
          plutil -insert NSLocationWhenInUseUsageDescription -string "GPS necessaire pour la vitesse." ios/Runner/Info.plist
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "GPS necessaire en arriere-plan." ios/Runner/Info.plist
      - name: Recuperation des dependances Flutter
        script: |
          flutter packages pub get
      - name: Configuration de CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Compilation brute de l application via Ad-Hoc
        script: |
          flutter build ios --release --no-codesign --xcargs "CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES"
      - name: Creation du fichier .ipa pour Sideloadly
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Xper.ipa Payload
    artifacts:
      - build/ios/iphoneos/Xper.ipa
