workflows:
  ios-build:
    name: iOS App Build
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Generer l environnement iOS et injecter les configurations
        script: |
          flutter create --org com.bx --project-name xper --platforms=ios .
          
          # Configuration des autorisations GPS (Methode -replace anti-crash)
          plutil -replace NSLocationWhenInUseUsageDescription -string "GPS requis pour l'application." ios/Runner/Info.plist
          plutil -replace NSLocationAlwaysAndWhenInUseUsageDescription -string "GPS requis pour l'application." ios/Runner/Info.plist
          
          # Simulation de l'equipe de developpement et retrait des verifications de signature
          mkdir -p ios/Flutter
          echo "DEVELOPMENT_TEAM = NX78XYZ123" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Release.xcconfig
      - name: Recuperer les dependances Pub
        script: |
          flutter pub get
      - name: Compiler pour iOS
        script: |
          flutter build ios --release --no-codesign
      - name: Packager en IPA non signe pour Sideloadly
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r Xper.ipa Payload
    artifacts:
      - build/ios/iphoneos/*.ipa
