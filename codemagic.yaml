workflows:
  ios-xper-release:
    name: Build iOS Automatique - Xper
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        XCODE_BUNDLE_IDENTIFIER: "com.bx.xper"
        APP_NAME: "Xper"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Génération automatique et propre du dossier iOS
        script: |
          # Force la création de la structure de projet iOS native et propre directement sur le serveur
          flutter create --platforms=ios .
          
          # Injection automatique des permissions Satellites GPS dans le fichier généré
          plutil -insert NSLocationWhenInUseUsageDescription -string "Cette application nécessite l'accès au GPS pour calculer votre vitesse et afficher votre position sur la carte." ios/Runner/Info.plist
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "Le GPS est nécessaire en arrière-plan pour continuer le suivi de la navigation." ios/Runner/Info.plist
      - name: Initialisation du trousseau de clés (Code Signing)
        script: |
          keychain initialize
      - name: Récupération des dépendances Flutter
        script: |
          flutter packages pub get
      - name: Configuration de la plateforme iOS (Podfile)
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Compilation de l'application (Création du fichier .ipa)
        script: |
          flutter build ipa --release --build-name=1.0.0 --build-number=1
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - bx-dev@exemple.com
