workflows:
  ios-xper-release:
    name: Build iOS Automatique - Xper
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        XCODE_BUNDLE_IDENTIFIER: "com.bx.xper"
        APP_NAME: "Xper"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 🛠️ Génération automatique du dossier iOS
        script: |
          flutter create --platforms=ios .
          plutil -insert NSLocationWhenInUseUsageDescription -string "GPS nécessaire pour la vitesse." ios/Runner/Info.plist
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "GPS nécessaire en arrière-plan." ios/Runner/Info.plist
      - name: Initialisation du trousseau de clés (Code Signing)
        script: |
          keychain initialize
      - name: Récupération des dépendances Flutter
        script: |
          flutter packages pub get
      - name: Configuration de la plateforme iOS (Podfile)
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Compilation de l'application (Mode sans signature)
        script: |
          # Le flag --no-codesign permet de valider le build sans compte Apple payant
          flutter build ipa --release --no-codesign --build-name=1.0.0 --build-number=1
    artifacts:
      - build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - bx-dev@exemple.com
